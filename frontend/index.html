<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LaunchFlow Sandbox</title>
    <link rel="stylesheet" href="/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="eyebrow">Candidate Sandbox</div>
          <h1>LaunchFlow</h1>
          <p>AI landing-page builder for offer-scoped funnels</p>
        </div>
        <section class="panel">
          <div class="panel-title">Offers</div>
          <div id="offerList" class="offer-list"></div>
        </section>
        <section class="panel">
          <div class="panel-title-row">
            <div class="panel-title">Saved Pages</div>
            <span id="pageCount" class="page-count">0</span>
          </div>
          <div id="pageList" class="page-list"></div>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <div class="eyebrow">Selected Offer</div>
            <h2 id="offerHeading">Loading…</h2>
            <p id="offerMeta" class="subline"></p>
          </div>
          <div class="status-row">
            <span id="syncBadge" class="badge">Idle</span>
            <span id="dirtyBadge" class="badge badge-muted">No local draft edits</span>
          </div>
        </header>

        <section class="workspace">
          <div class="preview-card">
            <div class="preview-header">
              <div>
                <div class="preview-title">Live Preview</div>
              </div>
              <div class="preview-actions">
                <button id="visitBtn" type="button">Visit Preview</button>
                <button id="copyBtn" type="button">Copy HTML</button>
              </div>
            </div>
            <iframe id="previewFrame" class="preview-frame" title="LaunchFlow preview"></iframe>
          </div>

          <div class="composer-card">
            <div class="composer-header">
              <div>
                <div class="eyebrow">Build Slice</div>
                <h3 id="pageHeading">Generate a landing page</h3>
              </div>
              <span id="draftStatus" class="page-count">No draft yet</span>
            </div>

            <form id="generateForm" class="field">
              <label for="notesInput" class="field-label">Page angle / hook notes</label>
              <div class="notes-composer">
                <textarea
                  id="notesInput"
                  class="notes-input"
                  placeholder="Example: Premium direct-response landing page for service founders who need stronger positioning and cleaner conversion."
                ></textarea>

                <div class="composer-actions">
                  <button id="generateBtn" type="submit">Generate HTML</button>
                  <button id="saveBtn" type="button" class="primary">Save Page</button>
                </div>
              </div>
            </form>
          </div>

          <div id="notice" class="notice notice-toast notice-info notice-hidden" role="status" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
